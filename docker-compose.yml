services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: bim_mep
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  db-init:
    build:
      context: .
      dockerfile: Dockerfile.app
    command: ["node", "--import", "tsx", "packages/stream-processor/src/init-db.ts"]
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/bim_mep

  signal-simulator:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    command: ["node", "--import", "tsx", "packages/signal-simulator/src/standalone.ts"]
    depends_on:
      db-init:
        condition: service_completed_successfully
      ingestion-gateway:
        condition: service_started
    environment:
      INGESTION_GATEWAY_URL: http://ingestion-gateway:3100

  ingestion-gateway:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    command: ["node", "--import", "tsx", "packages/ingestion-gateway/src/standalone.ts"]
    ports:
      - "3100:3100"
      - "1883:1883"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      MQTT_PORT: 1883

  stream-processor:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    command: ["node", "--import", "tsx", "packages/stream-processor/src/standalone.ts"]
    depends_on:
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/bim_mep

  api-server:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    command: ["node", "--import", "tsx", "packages/api-server/src/standalone.ts"]
    ports:
      - "3000:3000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/bim_mep

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api-server

volumes:
  timescale_data:
